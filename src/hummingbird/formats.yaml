# NNELS format enum — SOURCE OF TRUTH.
#
# Each entry has:
#   id    — integer used in `?format={n}` on NNELS download URLs
#   name  — stable UPPER_SNAKE_CASE constant (referenced by clients)
#   label — human-readable label as NNELS renders it in the UI (used
#           when parsing bookshelf / search result HTML)
#
# Loaded at import time by src/nnels/formats.py — edit here, then
# the Python constants update automatically.

formats:
