[project]
name = "hummingbird"
version = "0.1.1"
description = "Accessible-library HTTP server with a plugin architecture and a Kados-compatible RPC surface"
readme = "README.md"
license = "AGPL-3.0"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "httpx>=0.27",
  "pydantic>=2.8",
  "pydantic-settings>=2.5",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",
]

[project.scripts]
hummingbird = "hummingbird.main:run"

[dependency-groups]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "ruff>=0.7",
  # Local plugin for end-to-end testing. Production users install the
  # plugin they want via `pip install nnels` (or any other plugin);
  # hummingbird has no hard dependency on it.
  "nnels",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hummingbird"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.uv.sources]
nnels = { path = "../nnels", editable = true }
