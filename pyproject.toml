[project]
name = "hummingbird"
version = "0.1.3"
description = "Accessible-library HTTP server with a plugin architecture and a Kados-compatible RPC surface"
readme = "README.md"
license = "AGPL-3.0"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "httpx>=0.27",
  "pydantic>=2.8",
  "pydantic-settings>=2.5",
  "python-dotenv>=1.0",
  "pyyaml>=6.0",
]

[project.scripts]
hummingbird = "hummingbird.main:run"

[dependency-groups]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "ruff>=0.7",
]

# Optional local-only group: install with `uv sync --group local-plugins`
# to pull the editable nnels checkout for end-to-end plugin testing.
# Skipped by CI (which runs `uv sync --frozen` against the default
# group set) so a missing `../nnels` checkout doesn't break the build.
local-plugins = [
  "nnels",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hummingbird"]

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src"]

[tool.uv.sources]
# Editable nnels checkout, used only when the optional
# `local-plugins` dependency group is installed. CI doesn't sync that
# group, so the missing path doesn't matter there.
nnels = { path = "../nnels", editable = true }
